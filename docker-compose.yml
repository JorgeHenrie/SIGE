version: '3.9'

services:

  # ============================================================
  # PostgreSQL
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: sige_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_SENHA}
      POSTGRES_DB: sige_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dados:/var/lib/postgresql/data
      - ./banco:/docker-entrypoint-initdb.d
    networks:
      - sige_rede
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Backend PHP-FPM
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sige_backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sige_rede

  # ============================================================
  # Nginx — proxy reverso
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: sige_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/var/www/html/public
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - sige_rede

  # ============================================================
  # Frontend Vue — servidor de desenvolvimento
  # ============================================================
  frontend:
    image: node:20-alpine
    container_name: sige_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - nginx
    networks:
      - sige_rede

volumes:
  postgres_dados:

networks:
  sige_rede:
    driver: bridge
